<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ben House | Order Online</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght=400;600;700;900&display=swap');

        :root {
            --primary-color: #ff4757;
            --secondary-color: #ffa502;
            --dark-color: #2f3542;
            --light-color: #ffffff;
            --bg-color: #f1f2f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--dark-color);
            padding-top: 90px;
        }

        /* Navigation Header */
        header {
            background-color: var(--light-color);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            color: var(--primary-color);
            text-decoration: none;
        }

        .logo span {
            color: var(--secondary-color);
        }

        .order-badge {
            background-color: var(--dark-color);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
        }

        /* Layout Grid */
        .container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            padding: 30px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Menu Categories Filter Bar */
        .menu-filters {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .filter-btn {
            background-color: var(--light-color);
            border: 2px solid transparent;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn.active, .filter-btn:hover {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3);
        }

        /* Order Menu Grid */
        .order-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .item-card {
            background-color: var(--light-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .item-card:hover {
            transform: translateY(-5px);
        }

        .item-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .item-details {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .item-details h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .item-price {
            font-weight: 700;
            color: var(--primary-color);
            font-size: 18px;
            margin-top: auto;
            margin-bottom: 12px;
        }

        .add-to-cart-btn {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .add-to-cart-btn:hover {
            background-color: #e69500;
        }

        /* Sidebar Cart Section */
        .cart-sidebar {
            background-color: var(--light-color);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            height: fit-content;
            position: sticky;
            top: 110px;
        }

        .cart-sidebar h2 {
            font-size: 22px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 10px;
        }

        .cart-items-list {
            list-style: none;
            max-height: 240px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed #eee;
            animation: slideIn 0.3s ease;
        }

        .cart-item-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .cart-item-extra {
            font-size: 12px;
            color: #777;
            font-style: italic;
        }

        .cart-item-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .remove-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s ease;
            padding: 5px;
        }

        .remove-btn:hover {
            transform: scale(1.2);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: 700;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid var(--bg-color);
        }

        .checkout-btn {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3);
            transition: transform 0.2s;
        }

        .checkout-btn:hover {
            transform: scale(1.02);
        }

        /* Quantity Popup Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 2000;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .quantity-modal {
            background-color: var(--light-color);
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.open .quantity-modal {
            transform: scale(1);
        }

        .quantity-modal h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .quantity-modal p {
            color: #777;
            margin-bottom: 20px;
        }

        .quantity-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .qty-btn {
            background-color: var(--bg-color);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .qty-btn:hover {
            background-color: #e4e7eb;
        }

        .qty-number {
            font-size: 24px;
            font-weight: 700;
            min-width: 40px;
        }

        /* Extra Instructions Input Style */
        .extra-instructions-wrapper {
            margin-bottom: 25px;
            text-align: left;
        }

        .extra-instructions-wrapper label {
            font-size: 13px;
            font-weight: 600;
            color: var(--dark-color);
            display: block;
            margin-bottom: 5px;
        }

        .extra-input {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid var(--bg-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .extra-input:focus {
            border-color: var(--secondary-color);
        }

        .modal-actions {
            display: flex;
            gap: 15px;
        }

        .confirm-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            flex: 2;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }

        .cancel-btn {
            background-color: #dfe4ea;
            color: var(--dark-color);
            border: none;
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Success Message Popup Animation */
        .success-popup {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #2ed573;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(46, 213, 115, 0.3);
            z-index: 3000;
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .success-popup.show {
            top: 30px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .cart-sidebar { position: static; }
        }
    </style>
</head>
<body>

    <div id="successPopup" class="success-popup">🍗 Order Placed Successfully! Cooking now...</div>

    <div class="modal-overlay" id="quantityModal">
        <div class="quantity-modal">
            <h3 id="modalItemName">Item Name</h3>
            <p id="modalItemPrice">$0.00</p>
            
            <div class="quantity-controls">
                <button class="qty-btn" onclick="changeQty(-1)">-</button>
                <div class="qty-number" id="qtyDisplay">1</div>
                <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>

            <!-- Extra Instructions Section -->
            <div class="extra-instructions-wrapper">
                <label for="itemExtraInput">Extra Request / Instructions:</label>
                <input type="text" id="itemExtraInput" class="extra-input" placeholder="e.g., Spicy, No onions, extra cheese...">
            </div>

            <div class="modal-actions">
                <button class="cancel-btn" onclick="closeModal()">Cancel</button>
                <button class="confirm-btn" onclick="confirmAddToCart()">Confirm</button>
            </div>
        </div>
    </div>

    <header>
        <a href="index.html" class="logo">Ben <span>House</span></a>
        <div class="order-badge">Ben House | Order</div>
    </header>

    <div class="container">
        
        <main>
            <div class="menu-filters">
                <button class="filter-btn active">All Items</button>
                <button class="filter-btn">Meals</button>
                <button class="filter-btn">Burgers</button>
                <button class="filter-btn">Sides</button>
            </div>

            <div class="order-grid">
                <div class="item-card">
                    <img src="https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?q=80&w=2070" alt="Combo">
                    <div class="item-details">
                        <h3>Crunchy Combo</h3>
                        <p class="item-price">$12.99</p>
                        <button class="add-to-cart-btn" onclick="openQuantityModal('Crunchy Combo', 12.99)">Add to Order</button>
                    </div>
                </div>

                <div class="item-card">
                    <img src="https://images.unsplash.com/photo-1525059696034-4967a8e1dca2?q=80&w=1976" alt="Burger">
                    <div class="item-details">
                        <h3>Grand Burger</h3>
                        <p class="item-price">$8.49</p>
                        <button class="add-to-cart-btn" onclick="openQuantityModal('Grand Burger', 8.49)">Add to Order</button>
                    </div>
                </div>

                <div class="item-card">
                    <img src="https://images.unsplash.com/photo-1567620832903-9fc6debc209f?q=80&w=1980" alt="Tenders">
                    <div class="item-details">
                        <h3>Spicy Tenders</h3>
                        <p class="item-price">$6.99</p>
                        <button class="add-to-cart-btn" onclick="openQuantityModal('Spicy Tenders', 6.99)">Add to Order</button>
                    </div>
                </div>

                <div class="item-card">
                    <img src="https://images.unsplash.com/photo-1573080496219-bb080dd4f877?q=80&w=1974" alt="Fries">
                    <div class="item-details">
                        <h3>Ben Fries</h3>
                        <p class="item-price">$3.49</p>
                        <button class="add-to-cart-btn" onclick="openQuantityModal('Ben Fries', 3.49)">Add to Order</button>
                    </div>
                </div>
            </div>
        </main>

        <aside class="cart-sidebar">
            <h2>Your Cart</h2>
            <ul class="cart-items-list" id="cartList">
                <p style="color: #999; text-align: center; padding-top: 20px;" id="emptyMsg">Your cart is empty</p>
            </ul>
            <div class="cart-total">
                <span>Total:</span>
                <span id="totalPrice">$0.00</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">Place Order</button>
        </aside>

    </div>

    <script>
        let cart = [];
        let total = 0;

        let currentItemName = "";
        let currentItemPrice = 0;
        let currentQty = 1;

        function openQuantityModal(name, price) {
            currentItemName = name;
            currentItemPrice = price;
            currentQty = 1;

            document.getElementById('modalItemName').innerText = name;
            document.getElementById('modalItemPrice').innerText = `$${price.toFixed(2)} each`;
            document.getElementById('qtyDisplay').innerText = currentQty;
            document.getElementById('itemExtraInput').value = ""; // Reset instructions field

            document.getElementById('quantityModal').classList.add('open');
        }

        function closeModal() {
            document.getElementById('quantityModal').classList.remove('open');
        }

        function changeQty(amount) {
            currentQty += amount;
            if (currentQty < 1) currentQty = 1;
            document.getElementById('qtyDisplay').innerText = currentQty;
        }

        function confirmAddToCart() {
            document.getElementById('emptyMsg').style.display = 'none';

            let itemTotalPrice = currentItemPrice * currentQty;
            let uniqueId = Date.now();
            let extraText = document.getElementById('itemExtraInput').value.trim();

            cart.push({ 
                id: uniqueId,
                name: currentItemName,
                qty: currentQty,
                price: itemTotalPrice,
                extra: extraText // Store the extra text
            });
            
            total += itemTotalPrice;
            
            updateCartUI();
            closeModal();
        }

        function removeFromCart(id) {
            const itemIndex = cart.findIndex(item => item.id === id);
            if (itemIndex > -1) {
                total -= cart[itemIndex].price;
                cart.splice(itemIndex, 1);
            }

            updateCartUI();
        }

        function updateCartUI() {
            const cartList = document.getElementById('cartList');
            const totalDisplay = document.getElementById('totalPrice');
            
            cartList.innerHTML = '';
            
            if (cart.length === 0) {
                total = 0;
                cartList.innerHTML = '<p style="color: #999; text-align: center; padding-top: 20px;" id="emptyMsg">Your cart is empty</p>';
            } else {
                cart.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'cart-item';
                    
                    // Render extra instructions under the item name if present
                    let extraLabel = item.extra ? `<span class="cart-item-extra">+ Note: ${item.extra}</span>` : '';

                    li.innerHTML = `
                        <div class="cart-item-info">
                            <span>${item.name} (x${item.qty})</span>
                            ${extraLabel}
                        </div>
                        <div class="cart-item-right">
                            <strong>$${item.price.toFixed(2)}</strong>
                            <button class="remove-btn" onclick="removeFromCart(${item.id})">🗑️</button>
                        </div>
                    `;
                    cartList.appendChild(li);
                });
            }

            totalDisplay.innerText = `$${total.toFixed(2)}`;
        }

        function checkout() {
            if(cart.length === 0) {
                alert("Please add some items to your cart first!");
                return;
            }

            const popup = document.getElementById('successPopup');
            popup.classList.add('show');

            cart = [];
            total = 0;
            setTimeout(() => {
                popup.classList.remove('show');
                updateCartUI();
            }, 4000);
        }
    </script>
</body>
</html>
